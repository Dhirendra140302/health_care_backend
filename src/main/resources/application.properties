spring.config.import=optional:file:.env[.properties]

spring.application.name=health-care
server.port=${SERVER_PORT:8086}


# ===============================
# MySQL Database Connection
# ===============================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/healthcare}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / Hibernate
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


# ===============================
# JWT Configuration
# ===============================

jwt.secret.string=${JWT_SECRET}
jwt.expiration.time=${JWT_EXPIRATION:86400000}


# ===============================
# SMTP Mail Configuration
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


# ===============================
# Frontend URLs
# ===============================

login.link=http://localhost:3000/login
password.reset.link=http://localhost:3000/reset-password?code=